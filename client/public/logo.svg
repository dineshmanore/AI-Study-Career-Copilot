<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing Brilliance -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="primary_grad" x1="60" y1="20" x2="60" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#E0F2FF"/>
    </linearGradient>
  </defs>

  <!-- Abstract Book Pages (White/Elite Blue) -->
  <path d="M45 40C38 40 33 45 33 55V80C33 70 38 65 45 65H58V40H45Z" fill="white" fill-opacity="0.9" stroke="white" stroke-width="1.5"/>
  <path d="M41 35C34 35 29 40 29 50V75C29 65 34 60 41 60H58V35H41Z" fill="white" fill-opacity="0.5" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M37 30C30 30 25 35 25 45V70C25 60 30 55 37 55H58V30H37Z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" stroke-opacity="0.1"/>

  <!-- The "SE" Initials interwoven with Lightbulb (Stylized White) -->
  <g filter="url(#glow)">
    <!-- Lightbulb Outline -->
    <path d="M60 22C49 22 40 31 40 42C40 49 44 55 51 59V76C51 78.2 52.8 80 55 80H65C67.2 80 69 78.2 69 76V59C76 55 80 49 80 42C80 31 71 22 60 22Z" stroke="white" stroke-width="3.5" stroke-linejoin="round" fill="white" fill-opacity="0.1"/>
    
    <!-- Stylized 'S' inside -->
    <path d="M55 40C55 36 58 34 61 34C64 34 66 36 66 40C66 44 60 45 60 50C60 55 62 57 65 57" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Stylized 'E' prongs -->
    <path d="M72 45H88" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M72 58H92" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M72 71H88" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Brighter Light Rays -->
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="60" y1="8" x2="60" y2="15" />
    <line x1="88" y1="18" x2="82" y2="24" />
    <line x1="100" y1="42" x2="92" y2="42" />
    <line x1="32" y1="18" x2="38" y2="24" />
    <line x1="20" y1="42" x2="28" y2="42" />
  </g>
</svg>
